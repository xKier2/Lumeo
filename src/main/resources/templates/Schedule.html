<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>LumeoLMS</title>
</head>

<body>
<div th:fragments="main-body" class="flex h-screen w-full bg-gray-100 font-sans text-gray-800 overflow-hidden">

    <aside id="sidebar" class="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col transition-all duration-300 relative">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3 sidebar-text transition-all duration-300">
                <div class="w-8 h-8 bg-[#9b0a12] rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="text-xl font-bold text-gray-700">Lumeo</span>
            </div>

            <button id="toggle-btn" onclick="toggleSidebar()" class="p-1 hover:bg-gray-100 rounded-lg text-gray-500 transition-all">
                            <span class="text-xl">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
                            </span>
            </button>
        </div>

        <nav id="nav-menu" class="flex-1 px-4 py-4 space-y-8 overflow-x-hidden transition-all duration-300">
            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-2 sidebar-text">Main Menu</p>
                <div class="space-y-1">
                    <a th:href="@{/Dashboard}" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 hover:bg-red-100 rounded-xl transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-brands fa-dashcube"></i>
                                        </span>
                        <span class="font-medium sidebar-text">Dashboard</span>
                    </a>

                    <a th:href="@{/Courses}" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-red-100 rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-brands fa-leanpub"></i>
                                        </span>
                        <span class="sidebar-text">Courses</span>
                    </a>

                    <a th:href="@{/Schedule}" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 bg-[#9b0a12] text-white rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-regular fa-calendar-days"></i>
                                        </span>
                        <span class="sidebar-text">Class Schedule</span>
                    </a>
                </div>
            </div>

            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-2 sidebar-text">Tools</p>
                <div class="space-y-1">
                    <a href="#" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-red-100 rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-regular fa-note-sticky"></i>
                                        </span>
                        <span class="sidebar-text">Quizify</span>
                    </a>
                    <a href="#" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-red-100 rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-regular fa-cloud"></i>
                                        </span>
                        <span class="sidebar-text">Cloudify</span>
                    </a>
                </div>
            </div>

            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-2 sidebar-text">Account</p>
                <div class="space-y-1">
                    <a href="#" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-red-100 rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-solid fa-user-doctor"></i>
                                        </span>
                        <span class="sidebar-text">Teachers</span>
                    </a>
                    <a href="#" class="nav-link h-[52px] flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-red-100 rounded-lg transition-all">
                                        <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center nav-icon">
                                            <i class="fa-solid fa-gear"></i>
                                        </span>
                        <span class="sidebar-text">Settings</span>
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <div class="flex flex-col flex-1 min-w-0 h-screen overflow-hidden">
        <header class="flex-shrink-0 bg-white px-4 lg:px-8 py-4 flex justify-between items-center border-b border-gray-100 z-50">

            <div class="flex flex-col">
                <p class="text-[10px] lg:text-xs text-gray-400 font-medium">Hello,</p>
                <h1 class="text-md lg:text-lg font-bold text-gray-800 leading-tight">Mr. Kier Gabriel Tongol</h1>
            </div>

            <div class="flex items-center gap-4 lg:gap-8">
                <div class="flex items-center gap-3 lg:gap-6 text-gray-500">
                    <button class="hover:text-gray-800"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="hover:text-gray-800"><i class="fa-solid fa-bell"></i></button>
                </div>

                <div class="hidden lg:flex w-[218px] items-center justify-between border border-gray-200 rounded-[24px] px-[10px] py-1.5 bg-white shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-[44px] h-[44px] rounded-full overflow-hidden flex items-center justify-center">
                            <img src="../Images/DLSU-OfficialSeal.png" alt="Logo" class="object-contain">
                        </div>
                        <div class="flex flex-col leading-[1.0]">
                            <span style="color: #00703C; font-family: 'Times New Roman', Times, serif; letter-spacing: 0.05em;" class="text-[24px] font-bold">DLSU</span>
                        </div>
                    </div>
                    <div class="w-14 h-14 rounded-full border-2 border-gray-200 overflow-hidden">
                        <img src="../Images/user_profile.jpg" alt="User" class="w-full h-full object-cover">
                    </div>
                </div>

                <div class="lg:hidden w-10 h-10 rounded-full border-2 border-gray-200 overflow-hidden">
                    <img src="../Images/user_profile.jpg" alt="User" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <!-- SCROLLABLE CONTENT -->
        <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
            <div class="flex flex-col lg:flex-row gap-6 max-w-[1600px] mx-auto">

                <!-- LEFT: Main Schedule -->
                <div class="flex-1 bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden flex flex-col">
                    <div class="p-8">
                        <div class="flex items-center justify-between mb-8">
                            <div class="flex items-center gap-6">
                                <h1 class="text-2xl font-black text-gray-800 border-r border-gray-200 pr-6 uppercase tracking-tighter">Schedule</h1>
                                <h2 id="current-week-display" class="text-xl font-bold text-[#9b0a12]">April 2026</h2>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="changeWeek(-1)" class="p-2 hover:bg-gray-100 rounded-lg border border-gray-200 text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
                                <button onclick="changeWeek(1)" class="p-2 hover:bg-gray-100 rounded-lg border border-gray-200 text-gray-400"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>

                        <!-- Schedule Grid -->
                        <div class="grid grid-cols-[100px_repeat(7,1fr)] border-t border-gray-100">
                            <div class="py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-widest">Time</div>
                            <!-- Day headers generated by JS -->
                            <div id="day-headers-container" class="contents"></div>

                            <!-- Time Rows generated by JS -->
                            <div id="time-rows-container" class="contents"></div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Sidebar -->
                <div class="w-full lg:w-80 flex flex-col gap-6 flex-shrink-0">
                    <button class="w-full py-4 bg-[#9b0a12] text-white font-black rounded-2xl shadow-lg shadow-red-900/20 hover:bg-[#b30c14] transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-plus"></i> Add New Event
                    </button>

                    <!-- Mini Calendar -->
                    <div class="bg-white rounded-3xl border border-gray-100 p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-6">
                            <button onclick="changeMonth(-1)" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-chevron-left"></i></button>
                            <h3 id="mini-month-year" class="font-bold text-gray-700 uppercase tracking-tight text-sm">April 2026</h3>
                            <button onclick="changeMonth(1)" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        <div class="grid grid-cols-7 text-center mb-4">
                            <span class="text-[10px] font-bold text-gray-400 uppercase">S</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">M</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">T</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">W</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">T</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">F</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">S</span>
                        </div>
                        <div id="mini-calendar-days" class="grid grid-cols-7 gap-y-1"></div>
                    </div>

                    <!-- Today's Schedule -->
                    <div class="bg-white rounded-3xl border border-gray-100 p-8 shadow-sm flex-1 min-h-[250px] flex flex-col">
                        <h3 class="text-lg font-black text-gray-700 mb-6 uppercase tracking-tight">Today's Schedule</h3>
                        <div class="flex flex-col items-center justify-center flex-1 opacity-40">
                            <i class="fa-solid fa-calendar-day text-4xl mb-4"></i>
                            <p class="text-gray-500 font-medium text-sm">No schedule today</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<script src="../Services/Sidebar.js"></script>
<script src="../Services/Schedule.js"></script>
</body>
</html>

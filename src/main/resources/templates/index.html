<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LumeoLMS</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased h-screen w-full overflow-hidden flex items-center justify-center">
  <div class="flex h-full w-full bg-white shadow-2xl overflow-hidden lg:rounded-none">

    <div class="flex w-full flex-col justify-center px-10 md:px-24 lg:w-1/2 lg:px-32 bg-white">
      <div class="mb-10">
        <h1 class="text-5xl font-extrabold tracking-tight text-gray-900 mb-4">Welcome back!</h1>
        <p class="text-gray-500 text-lg">Simplify your workflow and boost your productivity with <span class="font-semibold text-[#9b0a12]">LumeoLMS</span>. Get started for free.</p>
      </div>

      <form th:action="@{/login}" method="post" class="space-y-6">
        <div>
          <input type="text" name="username" placeholder="Username" required
                 class="w-full rounded-full border border-gray-300 bg-white px-8 py-5 text-lg outline-none transition-all focus:border-[#9b0a12] focus:ring-2 focus:ring-red-100">
        </div>

        <div class="relative">
          <input type="password" name="password" placeholder="Password" required
                 class="w-full rounded-full border border-gray-300 bg-white px-8 py-5 text-lg outline-none transition-all focus:border-[#9b0a12] focus:ring-2 focus:ring-red-100">
          <button type="button" class="absolute right-8 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i class="fa-regular fa-eye-slash text-xl"></i>
          </button>
        </div>

        <div class="flex justify-end">
          <a href="#" class="text-sm font-semibold text-gray-700 hover:text-[#9b0a12]">Forgot Password?</a>
        </div>

        <button type="submit"
                class="w-full rounded-full bg-black py-5 text-xl font-bold text-white transition-all hover:bg-gray-800 active:scale-[0.99] shadow-lg">
          Login
        </button>
      </form>

      <div class="relative my-10 text-center">
        <span class="relative z-10 bg-white px-6 text-sm text-gray-400 font-medium">or continue with</span>
        <div class="absolute inset-0 top-1/2 h-px w-full -translate-y-1/2 bg-gray-200"></div>
      </div>

      <div class="flex justify-center gap-6">
        <button class="flex h-14 w-14 items-center justify-center rounded-full border border-gray-200 shadow-sm transition-all hover:bg-gray-50">
          <i class="fa-brands fa-google text-2xl"></i>
        </button>
        <button class="flex h-14 w-14 items-center justify-center rounded-full border border-gray-200 shadow-sm transition-all hover:bg-gray-50">
          <i class="fa-brands fa-apple text-3xl"></i>
        </button>
        <button class="flex h-14 w-14 items-center justify-center rounded-full border border-gray-200 shadow-sm transition-all hover:bg-gray-50">
          <i class="fa-brands fa-facebook text-3xl text-blue-600"></i>
        </button>
      </div>

      <p class="mt-12 text-center text-gray-600">
        Not a member? <a th:href="@{/register}" class="font-bold text-[#9b0a12] hover:underline">Register now</a>
      </p>
    </div>

    <div class="hidden lg:flex w-1/2 bg-[#f4faf6] flex-col items-center justify-center p-20 relative overflow-hidden">

      <div id="carousel-container" class="relative w-full max-w-lg flex flex-col items-center transition-all duration-700 ease-in-out">

        <div class="w-full h-[500px] flex items-center justify-center mb-12">
          <img id="carousel-image" th:src="@{/Images/Login_Page/Graduation-bro.svg}"
               alt="LMS Illustration" class="w-full h-full object-contain transition-opacity duration-500 opacity-100">
        </div>

        <div class="text-center px-10 h-32">
          <h2 id="carousel-text" class="text-3xl font-bold text-gray-800 leading-snug transition-opacity duration-500 opacity-100">
            Unlock your potential with Lumeo's advanced learning tools.
          </h2>

          <div class="mt-8 flex justify-center gap-3">
            <div id="dot-0" class="h-2 w-8 rounded-full bg-black transition-all duration-300"></div>
            <div id="dot-1" class="h-2 w-2 rounded-full bg-gray-300 transition-all duration-300"></div>
            <div id="dot-2" class="h-2 w-2 rounded-full bg-gray-300 transition-all duration-300"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="../Services/Login_func.js"></script>
</body>
</html>
